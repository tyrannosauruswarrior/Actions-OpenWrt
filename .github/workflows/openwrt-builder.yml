# 极简稳定版：适配FanchmWrt + JDCloud RE-SP-01B (MT7621)
# 彻底删除swap相关代码，根除权限报错；全用官方稳定版actions，无兼容问题
name: OpenWrt Builder
on:
  workflow_dispatch:

env:
  # 官方FanchmWrt源码，锁定不修改
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: fanchmwrt-24.10.4
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: 检出仓库文件
      uses: actions/checkout@v4

    - name: 安装编译依赖（无权限操作，纯官方源安装）
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex gawk gcc g++ git gettext libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 拉取FanchmWrt官方源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: 添加自定义插件源
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新并安装插件
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载设备配置
      run: |
        chmod +x $DIY_P2_SH
        cd openwrt
        mv $GITHUB_WORKSPACE/$CONFIG_FILE .config
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig

    - name: 下载编译依赖包
      run: |
        cd openwrt
        make download -j8

    - name: 编译固件（单线程稳定编译，零崩溃风险）
      id: compile
      run: |
        cd openwrt
        make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 打包输出固件
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: FanchmWrt-JDCloud-RE-SP-01B
        path: openwrt/bin/targets/*/*/*.bin
